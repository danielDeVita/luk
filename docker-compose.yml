name: luk-local

services:
  postgres:
    image: postgres:15-alpine
    container_name: luk_db
    environment:
      POSTGRES_USER: raffle_user
      POSTGRES_PASSWORD: raffle_password
      POSTGRES_DB: raffle_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raffle_user -d raffle_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: luk_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luk_backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://raffle_user:raffle_password@postgres:5432/raffle_db
      REDIS_URL: redis://redis:6379
      PORT: 3001
      # For local Docker: use localhost (browser connects directly)
      # For production: set these via .env or override
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:3001
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time args are baked into the Next.js bundle.
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
        NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
        NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
        NEXT_PUBLIC_TURNSTILE_ENABLED: "false"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ""
        NEXT_PUBLIC_SENTRY_DSN: ""
        NEXT_PUBLIC_SENTRY_RELEASE: local-docker
        SENTRY_DSN: ""
        SENTRY_RELEASE: local-docker
    container_name: luk_frontend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
