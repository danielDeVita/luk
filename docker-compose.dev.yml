name: luk-dev

services:
  # NOTE: postgres service removed - using Neon cloud database
  # Set DATABASE_URL in backend/.env to point to your Neon database

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
      - "5555:5555"
    environment:
      - NODE_ENV=development
      # DATABASE_URL comes from .env file (Neon)
      - REDIS_URL=redis://redis:6379
      - SOCIAL_PROMOTION_ENABLED=true
      - SOCIAL_PROMOTION_BROWSER_ENABLED=false
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_GRAPHQL_URL=http://localhost:3001/graphql
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

  social-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.social-worker
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - SOCIAL_PROMOTION_ENABLED=true
      - SOCIAL_PROMOTION_BROWSER_ENABLED=true
      - SOCIAL_PROMOTION_CHECK_CRON=0 */6 * * *
      - SOCIAL_PROMOTION_FETCH_TIMEOUT_MS=30000
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  redis_data_dev:
