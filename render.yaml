# LUK deployment configuration
# Documentation: https://docs.render.com/blueprint-spec

services:
  # Backend API (NestJS)
  - type: web
    name: luk-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: PLATFORM_FEE_PERCENT
        value: "4"
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_CLIENT_ID
        sync: false
      - key: MP_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_RELEASE
        sync: false
      - key: EMAIL_FROM
        value: noreply@yourdomain.com
      - key: GRAPHQL_PLAYGROUND
        value: "false"
      - key: GRAPHQL_DEBUG
        value: "false"
      - key: SOCIAL_PROMOTION_ENABLED
        value: "true"
      - key: SOCIAL_PROMOTION_BROWSER_ENABLED
        value: "false"

  - type: worker
    name: luk-social-promotion-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.social-worker
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_RELEASE
        sync: false
      - key: SOCIAL_PROMOTION_ENABLED
        value: "true"
      - key: SOCIAL_PROMOTION_BROWSER_ENABLED
        value: "true"
      - key: SOCIAL_PROMOTION_CHECK_CRON
        value: "0 */6 * * *"
      - key: SOCIAL_PROMOTION_FETCH_TIMEOUT_MS
        value: "30000"

  # Frontend (Next.js)
  - type: web
    name: luk-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_GRAPHQL_URL
        sync: false
      - key: NEXT_PUBLIC_GRAPHQL_WS_URL
        sync: false
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
      - key: NEXT_PUBLIC_TURNSTILE_ENABLED
        value: "false"
      - key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
        sync: false
      - key: NEXT_PUBLIC_GA_MEASUREMENT_ID
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_RELEASE
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_RELEASE
        sync: false
