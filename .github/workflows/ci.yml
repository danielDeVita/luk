name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==================== Backend ====================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: raffle_user
          POSTGRES_PASSWORD: raffle_password
          POSTGRES_DB: raffle_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          MP_ACCESS_TOKEN: TEST-placeholder
          MP_PUBLIC_KEY: TEST-placeholder
          BREVO_API_KEY: test-brevo-key
          EMAIL_FROM: test@example.com

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  # ==================== Frontend ====================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run component tests
        run: npm run test:unit -- --run
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001

      - name: Type check and build
        run: npm run build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

  # ==================== E2E Tests (Optional) ====================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Auth tests now use API-based login (apiLogin) instead of UI form

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: raffle_user
          POSTGRES_PASSWORD: raffle_password
          POSTGRES_DB: raffle_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Sync database schema
        working-directory: backend
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db

      - name: Seed database with test users
        working-directory: backend
        run: npx ts-node prisma/seed.ts
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          # Start backend and redirect output to a log file
          npm run start:prod > backend.log 2>&1 &
          echo $! > backend.pid
          # Give it a moment to start
          sleep 5
          # Show initial log output
          echo "=== Backend startup log ==="
          cat backend.log || true
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PORT: 3001
          NODE_ENV: production
          CI: 'true'
          SECURE_COOKIES: 'false'
          THROTTLE_LIMIT: 1000
          MP_ACCESS_TOKEN: TEST-placeholder
          MP_PUBLIC_KEY: TEST-placeholder
          BREVO_API_KEY: test-brevo-key
          EMAIL_FROM: test@example.com
          CORS_ORIGIN: http://localhost:3000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend
        working-directory: backend
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            # Check if GraphQL endpoint responds with expected content
            RESPONSE=$(curl -s -X POST http://localhost:3001/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ __typename }"}' 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "Query"; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 2
          done
          # Final verification
          if ! curl -s -X POST http://localhost:3001/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __typename }"}' | grep -q "Query"; then
            echo "=== Backend failed to start! Showing logs ==="
            cat backend.log || true
            echo "=== Checking if process is running ==="
            ps aux | grep node || true
            exit 1
          fi
          echo "Backend verification passed!"

      - name: Start frontend
        working-directory: frontend
        run: |
          # Copy static assets for standalone mode
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Start standalone server
          node .next/standalone/server.js &
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder
          PORT: 3000

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 | grep -q "<html"; then
              echo "Frontend is ready!"
              # Give it a few more seconds to fully initialize
              sleep 3
              break
            fi
            echo "Attempt $i: Frontend not ready yet..."
            sleep 2
          done
          # Final verification
          curl -s http://localhost:3000 | head -50 || (echo "Frontend failed to start!" && exit 1)

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --max-failures=10
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
