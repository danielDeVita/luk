name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ==================== Backend ====================
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: raffle_user
          POSTGRES_PASSWORD: raffle_password
          POSTGRES_DB: raffle_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          MP_ACCESS_TOKEN: TEST-placeholder
          MP_PUBLIC_KEY: TEST-placeholder
          BREVO_API_KEY: test-brevo-key
          EMAIL_FROM: test@example.com

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

  # ==================== Frontend ====================
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run component tests
        run: npm run test:unit -- --run
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001

      - name: Type check and build
        run: npm run build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

  # ==================== E2E Tests (Optional) ====================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: raffle_user
          POSTGRES_PASSWORD: raffle_password
          POSTGRES_DB: raffle_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Sync database schema
        working-directory: backend
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db

      - name: Start backend
        working-directory: backend
        run: npm run start:prod &
        env:
          DATABASE_URL: postgresql://raffle_user:raffle_password@localhost:5432/raffle_db
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          PORT: 3001

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3001/graphql && break
            echo "Waiting for backend..."
            sleep 2
          done

      - name: Start frontend
        working-directory: frontend
        run: npm start &
        env:
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder
          PORT: 3000

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 && break
            echo "Waiting for frontend..."
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
          NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
          NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
          NEXT_PUBLIC_MP_PUBLIC_KEY: TEST-placeholder
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
