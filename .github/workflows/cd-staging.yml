name: CD - Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'
      skip_tests:
        description: 'Skip waiting for CI tests'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  # ==================== Optional CI Check ====================
  ci-check:
    name: Wait for CI (Optional)
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - name: Wait for Backend CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: 'Backend'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success
        continue-on-error: true

  # ==================== Deploy Backend ====================
  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: [ci-check]
    if: always()
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        run: railway up --service backend-staging --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Wait for deployment
        run: sleep 30

      - name: Health Check
        run: |
          echo "Checking staging backend health..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.BACKEND_URL_STAGING }}/health/ready" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging backend is healthy!"
              exit 0
            fi
            echo "Waiting... (attempt $i/20, status: $STATUS)"
            sleep 10
          done
          echo "Staging backend health check failed"
          exit 1

  # ==================== Deploy Frontend ====================
  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Frontend
        run: railway up --service frontend-staging --detach
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Wait for deployment
        run: sleep 30

      - name: Health Check
        run: |
          echo "Checking staging frontend health..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.FRONTEND_URL_STAGING }}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging frontend is healthy!"
              exit 0
            fi
            echo "Waiting... (attempt $i/20, status: $STATUS)"
            sleep 10
          done
          echo "Staging frontend health check failed"
          exit 1

  # ==================== Summary ====================
  summary:
    name: Staging Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "=========================================="
          echo "STAGING DEPLOYMENT SUMMARY"
          echo "=========================================="
          echo "Branch: ${{ inputs.branch }}"
          echo "Backend: ${{ needs.deploy-backend.result }}"
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo ""
          if [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "Staging URLs:"
            echo "  Backend: ${{ secrets.BACKEND_URL_STAGING }}"
            echo "  Frontend: ${{ secrets.FRONTEND_URL_STAGING }}"
          fi
          echo "=========================================="
